<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Construction Simulation Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffdf9;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #e8dccb;
      --accent: #b45309;
      --shadow: 0 18px 40px rgba(72, 52, 22, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 80%;
      background:
        radial-gradient(circle at top, rgba(180, 83, 9, 0.14), transparent 28%),
        linear-gradient(180deg, #f7f2e9 0%, var(--bg) 100%);
      color: var(--ink);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(255, 253, 249, 0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 0.7rem 0.85rem;
    }

    h1, h2 {
      margin: 0;
    }

    h1 {
      font-size: 1.85rem;
      line-height: 1.05;
    }

    .header-row,
    .control-bar,
    .kpis,
    .top-summary {
      display: flex;
      gap: 0.45rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .header-row {
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .status-chip {
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.82rem;
      background: #fff7ed;
      color: var(--accent);
    }

    .control-bar button {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 0.38rem 0.68rem;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }

    .control-inline {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 0.32rem 0.55rem;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .control-inline input {
      width: 4.1rem;
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      color: var(--ink);
      text-align: center;
    }

    .control-bar button[data-active="true"] {
      background: #fff7ed;
      border-color: #f59e0b;
      color: var(--accent);
    }

    .kpis,
    .top-summary {
      margin-top: 0.5rem;
    }

    .kpi {
      min-width: 6rem;
      padding: 0.55rem 0.7rem;
      border-radius: 1rem;
      border: 1px solid var(--line);
      background: white;
      box-shadow: var(--shadow);
    }

    .kpi.metric {
      min-width: 5.35rem;
    }

    .kpi.trade {
      min-width: 8.25rem;
      flex: 1 1 8.25rem;
    }

    .kpi-label {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .kpi-value {
      font-size: 0.96rem;
      font-weight: 800;
      margin-top: 0.08rem;
    }

    .page {
      padding: 0.75rem;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 1.25rem;
      padding: 0.8rem;
      box-shadow: var(--shadow);
      min-height: 18.5rem;
      overflow: hidden;
    }

    .panel p {
      color: var(--muted);
      margin: 0.2rem 0 0.45rem;
      font-size: 0.88rem;
    }

    .chart-wrap {
      position: relative;
      min-height: 14rem;
    }

    canvas {
      width: 100%;
      max-height: 16rem;
    }

    .cpm-meta {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
      font-weight: 700;
    }

    .cpm-board {
      display: grid;
      gap: 0.35rem;
    }

    .cpm-floor {
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 0.35rem 0.55rem;
      background: #fffbf5;
    }

    .cpm-floor.active-floor {
      border-color: #f59e0b;
      box-shadow: inset 0 0 0 1px rgba(180, 83, 9, 0.16);
      background: #fff7ed;
    }

    .cpm-floor-title {
      font-weight: 800;
      margin-bottom: 0.2rem;
      font-size: 0.82rem;
    }

    .cpm-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 0.8rem minmax(0, 1fr) 0.8rem minmax(0, 1fr) 0.8rem minmax(0, 1fr) 0.8rem minmax(0, 1fr);
      gap: 0.18rem;
      align-items: center;
    }

    .cpm-node {
      border: 1px solid #cbd5e1;
      border-radius: 0.85rem;
      background: #f8fafc;
      padding: 0.25rem 0.22rem;
      text-align: center;
      min-height: 2.45rem;
      display: grid;
      place-items: center;
    }

    .cpm-node-name {
      font-size: 0.64rem;
      font-weight: 700;
      line-height: 1.05;
    }

    .cpm-node-progress {
      font-size: 0.58rem;
      color: var(--muted);
      margin-top: 0.08rem;
    }

    .cpm-arrow {
      text-align: center;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.74rem;
    }

    .cpm-node.blocked {
      background: #e5e7eb;
      border-color: #9ca3af;
    }

    .cpm-node.ready {
      background: #dbeafe;
      border-color: #60a5fa;
    }

    .cpm-node.active {
      background: #fde68a;
      border-color: #f59e0b;
    }

    .cpm-node.complete {
      background: #bbf7d0;
      border-color: #4ade80;
    }

    .legend {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      font-size: 0.76rem;
      color: var(--muted);
    }

    .legend span::before {
      content: "";
      display: inline-block;
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 999px;
      margin-right: 0.35rem;
      vertical-align: middle;
    }

    .legend .blocked::before { background: #d1d5db; }
    .legend .ready::before { background: #93c5fd; }
    .legend .active::before { background: #fbbf24; }
    .legend .complete::before { background: #86efac; }

    .error {
      color: #b91c1c;
      font-weight: 700;
    }

    @media (max-width: 960px) {
      .page {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      header {
        position: static;
      }

      h1 {
        font-size: 1.45rem;
      }

      .control-bar button {
        font-size: 0.76rem;
        padding: 0.34rem 0.56rem;
      }

      .kpi {
        min-width: calc(50% - 0.3rem);
      }

      .kpi.trade,
      .kpi.metric {
        min-width: calc(50% - 0.3rem);
      }

      .cpm-node-name {
        font-size: 0.62rem;
      }

      .cpm-node-progress {
        font-size: 0.58rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>Construction Simulation Dashboard</h1>
        <div id="liveStatus" class="status-chip">Connecting to Firebase...</div>
      </div>
    </div>

    <div class="control-bar" aria-label="Simulation controls">
      <button id="initialize" type="button">Initialize / Reset</button>
      <button id="start" type="button">Start</button>
      <button id="pause" type="button">Pause</button>
      <button id="fatigue" type="button">Fatigue</button>
      <button id="rain" type="button">Rain</button>
      <button id="robot" type="button">Robot Assistance</button>
      <label class="control-inline" for="plannedFactor">
        <span>S</span>
        <input id="plannedFactor" type="number" min="0.2" max="500" step="0.05" value="10">
      </label>
    </div>

    <div id="topSummary" class="top-summary" aria-label="Simulation summary and team productivity">
      <article class="kpi metric"><div class="kpi-label">Overall Progress</div><div id="overallProgress" class="kpi-value">0%</div></article>
      <article class="kpi metric"><div class="kpi-label">Time</div><div id="tick" class="kpi-value">0</div></article>
      <article class="kpi metric"><div class="kpi-label">Working Crews</div><div id="workingCrews" class="kpi-value">0</div></article>
      <article class="kpi metric"><div class="kpi-label">Blocked Crews</div><div id="blockedCrews" class="kpi-value">0</div></article>
      <article class="kpi metric"><div class="kpi-label">Completed Tasks</div><div id="completedTasks" class="kpi-value">0</div></article>
      <div id="teamMultipliers" class="top-summary" aria-label="Team productivity multipliers"></div>
    </div>
  </header>

  <main class="page">
    <section class="panel" aria-labelledby="cpm-title">
      <h2 id="cpm-title">CPM</h2>
      <div class="cpm-meta">
        <span id="activeFloor">Active Floor: 1</span>
        <div class="legend">
          <span class="blocked">Blocked</span>
          <span class="ready">Ready</span>
          <span class="active">Active</span>
          <span class="complete">Complete</span>
        </div>
      </div>
      <div id="cpmError" class="error" hidden></div>
      <div id="cpm" class="cpm-board"></div>
    </section>

    <section class="panel" aria-labelledby="gantt-title">
      <h2 id="gantt-title">Gantt Chart</h2>
      <div class="chart-wrap"><canvas id="gantt"></canvas></div>
    </section>

    <section class="panel" aria-labelledby="scurve-title">
      <h2 id="scurve-title">Progress S-Curve</h2>
      <div class="chart-wrap"><canvas id="scurve"></canvas></div>
    </section>

    <section class="panel" aria-labelledby="lob-title">
      <h2 id="lob-title">Line of Balance</h2>
      <div class="chart-wrap"><canvas id="lob"></canvas></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, runTransaction } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
    import { firebaseConfig } from "./firebase-config.js";
    import {
      AUTO_PROGRESS_INTERVAL_MS,
      FLOORS,
      GAME_PATH,
      TRADES,
      applyAutoProgress,
      applyControlToggle,
      getActiveFloor,
      getDashboardMetrics,
      getTaskPlannedPoints,
      getTaskNodeState,
      getTradeColor,
      makeInitialState,
      sanitizeState,
      setPlannedProductivityFactor,
      setRunning
    } from "./simulation.js";

    mermaid.initialize({ startOnLoad: false, securityLevel: "loose" });

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, GAME_PATH);

    const statusEl = document.querySelector("#liveStatus");
    const cpmEl = document.querySelector("#cpm");
    const cpmErrorEl = document.querySelector("#cpmError");
    const activeFloorEl = document.querySelector("#activeFloor");

    const metricEls = {
      overallProgress: document.querySelector("#overallProgress"),
      tick: document.querySelector("#tick"),
      workingCrews: document.querySelector("#workingCrews"),
      blockedCrews: document.querySelector("#blockedCrews"),
      completedTasks: document.querySelector("#completedTasks")
    };
    const teamMultipliersEl = document.querySelector("#teamMultipliers");

    const controlButtons = {
      initialize: document.querySelector("#initialize"),
      start: document.querySelector("#start"),
      pause: document.querySelector("#pause"),
      fatigue: document.querySelector("#fatigue"),
      rain: document.querySelector("#rain"),
      robot: document.querySelector("#robot")
    };
    const plannedFactorInput = document.querySelector("#plannedFactor");

    let latestState = null;
    let ganttChart = null;
    let sCurveChart = null;
    let lobChart = null;
    let mermaidRenderCount = 0;
    let autoProgressTimer = null;
    let fixedTimeAxisMax = 100;

    function updateStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function getFixedTimeAxisMax(state) {
      const tasks = Object.values(state?.tasks || {});
      const plannedMax = Math.max(...tasks.map((task) => task.plannedFinishTick || 0), 0);
      return Math.max(100, Math.ceil((plannedMax + 20) / 10) * 10);
    }

    function setButtonActive(button, active) {
      button.dataset.active = active ? "true" : "false";
    }

    async function initializeGame() {
      await set(gameRef, makeInitialState());
    }

    async function updateStateTransaction(updater) {
      await runTransaction(gameRef, (state) => updater(state), { applyLocally: false });
    }

    async function tickAutoProgress() {
      try {
        await updateStateTransaction((state) => {
          if (!state) {
            return state;
          }
          return applyAutoProgress(state, Date.now());
        });
      } catch (error) {
        updateStatus(`Firebase unavailable: ${error.message}`, true);
      }
    }

    function syncAutoProgressLoop(state) {
      if (autoProgressTimer) {
        window.clearInterval(autoProgressTimer);
        autoProgressTimer = null;
      }
      if (!state?.running) {
        return;
      }
      autoProgressTimer = window.setInterval(() => {
        tickAutoProgress();
      }, AUTO_PROGRESS_INTERVAL_MS);
    }

    controlButtons.initialize.addEventListener("click", async () => {
      try {
        await initializeGame();
      } catch (error) {
        updateStatus(`Firebase unavailable: ${error.message}`, true);
      }
    });

    controlButtons.start.addEventListener("click", async () => {
      try {
        await updateStateTransaction((state) => setRunning(state || makeInitialState(), true));
      } catch (error) {
        updateStatus(`Firebase unavailable: ${error.message}`, true);
      }
    });

    controlButtons.pause.addEventListener("click", async () => {
      try {
        await updateStateTransaction((state) => state ? setRunning(state, false) : state);
      } catch (error) {
        updateStatus(`Firebase unavailable: ${error.message}`, true);
      }
    });

    controlButtons.fatigue.addEventListener("click", async () => {
      try {
        await updateStateTransaction((state) => applyControlToggle(state || makeInitialState(), "fatigueEnabled", !(sanitizeState(state || makeInitialState()).controls.fatigueEnabled)));
      } catch (error) {
        updateStatus(`Firebase unavailable: ${error.message}`, true);
      }
    });

    controlButtons.rain.addEventListener("click", async () => {
      try {
        await updateStateTransaction((state) => applyControlToggle(state || makeInitialState(), "rainEnabled", !(sanitizeState(state || makeInitialState()).environment.rainActive)));
      } catch (error) {
        updateStatus(`Firebase unavailable: ${error.message}`, true);
      }
    });

    controlButtons.robot.addEventListener("click", async () => {
      try {
        await updateStateTransaction((state) => applyControlToggle(state || makeInitialState(), "robotEnabled", !(sanitizeState(state || makeInitialState()).environment.robotAssistanceActive)));
      } catch (error) {
        updateStatus(`Firebase unavailable: ${error.message}`, true);
      }
    });

    plannedFactorInput.addEventListener("change", async () => {
      const nextValue = Math.max(0.2, Math.min(500, Number(plannedFactorInput.value) || 10));
      plannedFactorInput.value = nextValue.toFixed(2).replace(/\.00$/, "");
      try {
        await updateStateTransaction((state) => setPlannedProductivityFactor(state || makeInitialState(), nextValue));
      } catch (error) {
        updateStatus(`Firebase unavailable: ${error.message}`, true);
      }
    });

    function renderControls(state) {
      setButtonActive(controlButtons.fatigue, state.controls.fatigueEnabled);
      setButtonActive(controlButtons.rain, state.environment.rainActive);
      setButtonActive(controlButtons.robot, state.environment.robotAssistanceActive);
      plannedFactorInput.value = String(state.controls?.plannedProductivityFactor ?? 10);
    }

    function renderMetrics(state) {
      const metrics = getDashboardMetrics(state);
      metricEls.overallProgress.textContent = `${metrics.overallProgressPct}%`;
      metricEls.tick.textContent = String(metrics.tick);
      metricEls.workingCrews.textContent = String(metrics.workingCrews);
      metricEls.blockedCrews.textContent = String(metrics.blockedCrews);
      metricEls.completedTasks.textContent = String(metrics.completedTasks);
      activeFloorEl.textContent = `Active Floor: ${metrics.activeFloor}`;
    }

    function renderTeamMultipliers(state) {
      teamMultipliersEl.innerHTML = "";
      TRADES.forEach((trade) => {
        const team = state.teams[trade.team];
        const card = document.createElement("article");
        card.className = "kpi trade";
        card.innerHTML = `
          <div class="kpi-label">${trade.name}</div>
          <div class="kpi-value">${team.productivityMultiplier.toFixed(2)}x</div>
          <div class="kpi-label">Fatigue ${team.fatigueMultiplier.toFixed(2)}x | Rain ${team.rainMultiplier.toFixed(2)}x | Robot ${team.robotMultiplier.toFixed(2)}x</div>
        `;
        teamMultipliersEl.appendChild(card);
      });
    }

    async function renderCPM(state) {
      const activeFloor = getActiveFloor(state);

      try {
        cpmEl.innerHTML = "";
        for (let floor = FLOORS; floor >= 1; floor -= 1) {
          const floorEl = document.createElement("section");
          floorEl.className = `cpm-floor${floor === activeFloor ? " active-floor" : ""}`;

          const titleEl = document.createElement("div");
          titleEl.className = "cpm-floor-title";
          titleEl.textContent = `Floor ${floor}`;
          floorEl.appendChild(titleEl);

          const rowEl = document.createElement("div");
          rowEl.className = "cpm-row";

          TRADES.forEach((trade, index) => {
            const task = state.tasks[`${trade.id}-F${floor}`];
            const pct = Math.round((task.done / task.required) * 100);
            const nodeState = getTaskNodeState(task);

            const nodeEl = document.createElement("article");
            nodeEl.className = `cpm-node ${nodeState}`;
            nodeEl.innerHTML = `
              <div>
                <div class="cpm-node-name">${trade.name}</div>
                <div class="cpm-node-progress">${pct}%</div>
              </div>
            `;
            rowEl.appendChild(nodeEl);

            if (index < TRADES.length - 1) {
              const arrowEl = document.createElement("div");
              arrowEl.className = "cpm-arrow";
              arrowEl.textContent = "→";
              rowEl.appendChild(arrowEl);
            }
          });

          floorEl.appendChild(rowEl);
          cpmEl.appendChild(floorEl);
        }
        cpmErrorEl.hidden = true;
      } catch (error) {
        cpmErrorEl.hidden = false;
        cpmErrorEl.textContent = `Unable to render CPM: ${error.message}`;
      }
    }

    function ensureGanttChart() {
      if (ganttChart) {
        return ganttChart;
      }
      ganttChart = new Chart(document.querySelector("#gantt"), {
        type: "bar",
        data: {
          labels: [],
          datasets: [
            {
              label: "Planned",
              data: [],
              backgroundColor: "rgba(59, 130, 246, 0.4)",
              borderColor: "#2563eb",
              borderWidth: 1
            },
            {
              label: "Actual",
              data: [],
              backgroundColor: "rgba(217, 119, 6, 0.5)",
              borderColor: "#b45309",
              borderWidth: 1
            }
          ]
        },
        options: {
          indexAxis: "y",
          responsive: true,
          animation: false,
          scales: {
            x: {
              title: { display: true, text: "Time" }
            }
          }
        }
      });
      return ganttChart;
    }

    function renderGantt(state) {
      const chart = ensureGanttChart();
      const tasks = Object.values(state.tasks)
        .sort((a, b) => a.floor - b.floor || a.team - b.team);

      chart.data.labels = tasks.map((task) => `F${task.floor} ${task.tradeName}`);
      chart.data.datasets[0].data = tasks.map((task) => [task.plannedStartTick, task.plannedFinishTick]);
      chart.data.datasets[1].data = tasks.map((task) => {
        const actualStart = Number.isFinite(task.startTick) && task.startTick > 0 ? task.startTick : null;
        const actualFinish = Number.isFinite(task.finishTick) && task.finishTick > 0 ? task.finishTick : state.tick;
        if (actualStart === null) {
          return null;
        }
        return [actualStart, actualFinish];
      });
      chart.options.scales.x.min = 0;
      chart.options.scales.x.max = fixedTimeAxisMax;
      chart.update();
    }

    function ensureSCurveChart() {
      if (sCurveChart) {
        return sCurveChart;
      }
      sCurveChart = new Chart(document.querySelector("#scurve"), {
        type: "line",
        data: {
          datasets: [
            {
              label: "Planned Progress",
              data: [],
              parsing: false,
              borderColor: "#2563eb",
              borderDash: [6, 4],
              tension: 0.2,
              pointRadius: 0,
              pointHoverRadius: 0
            },
            {
              label: "Actual Progress",
              data: [],
              parsing: false,
              borderColor: "#b45309",
              backgroundColor: "rgba(180, 83, 9, 0.12)",
              fill: true,
              tension: 0.2,
              pointRadius: 0,
              pointHoverRadius: 0
            }
          ]
        },
        options: {
          responsive: true,
          animation: false,
          scales: {
            x: { type: "linear", title: { display: true, text: "Time" } },
            y: { min: 0, max: 100, title: { display: true, text: "Cumulative Progress (%)" } }
          }
        }
      });
      return sCurveChart;
    }

    function renderSCurve(state) {
      const chart = ensureSCurveChart();
      const actual = (state.history || []).map((item) => ({
        x: item.tick,
        y: item.overallProgress
      }));
      const planned = getTaskPlannedPoints(state);

      chart.data.datasets[0].data = planned;
      chart.data.datasets[1].data = actual;
      chart.options.scales.x.min = 0;
      chart.options.scales.x.max = fixedTimeAxisMax;
      chart.update();
    }

    function ensureLOBChart() {
      if (lobChart) {
        return lobChart;
      }
      lobChart = new Chart(document.querySelector("#lob"), {
        type: "line",
        data: { datasets: [] },
        options: {
          responsive: true,
          animation: false,
          scales: {
            x: { type: "linear", title: { display: true, text: "Time" } },
            y: {
              min: 1,
              max: 4,
              reverse: false,
              ticks: { stepSize: 1 },
              title: { display: true, text: "Floor" }
            }
          }
        }
      });
      return lobChart;
    }

    function renderLOB(state) {
      const chart = ensureLOBChart();
      const tradeDatasets = TRADES.flatMap((trade) => {
        const actualFinishPoints = [];
        const plannedFinishPoints = [];
        for (let floor = 1; floor <= FLOORS; floor += 1) {
          const task = state.tasks[`${trade.id}-F${floor}`];
          plannedFinishPoints.push({
            x: task.plannedFinishTick,
            y: floor
          });
          const finishTick = Number.isFinite(task.finishTick) && task.finishTick > 0 ? task.finishTick : null;

          if (finishTick !== null) {
            actualFinishPoints.push({
              x: finishTick,
              y: floor
            });
          }
        }
        return [
          {
            label: `${trade.name} Planned Finish`,
            data: plannedFinishPoints.sort((a, b) => a.y - b.y),
            parsing: false,
            borderColor: getTradeColor(trade.id),
            backgroundColor: getTradeColor(trade.id),
            borderDash: [6, 4],
            pointRadius: 0,
            pointHoverRadius: 0,
            showLine: true,
            spanGaps: false,
            tension: 0
          },
          {
            label: `${trade.name} Actual Finish`,
            data: actualFinishPoints.sort((a, b) => a.y - b.y),
            parsing: false,
            borderColor: getTradeColor(trade.id),
            backgroundColor: getTradeColor(trade.id),
            pointRadius: 3,
            pointHoverRadius: 4,
            showLine: true,
            spanGaps: false,
            tension: 0
          }
        ];
      });
      const collisionPoints = [];

      TRADES.forEach((trade, tradeIndex) => {
        for (let floor = 1; floor <= FLOORS; floor += 1) {
          const task = state.tasks[`${trade.id}-F${floor}`];
          if (!task || task.startTick === null || task.startTick <= 0) {
            continue;
          }

          if (floor > 1) {
            const previousFloorTask = state.tasks[`${trade.id}-F${floor - 1}`];
            if (previousFloorTask?.finishTick && task.startTick < previousFloorTask.finishTick) {
              collisionPoints.push({ x: task.startTick, y: floor });
            }
          }

          if (tradeIndex > 0) {
            const predecessorTask = state.tasks[`${TRADES[tradeIndex - 1].id}-F${floor}`];
            if (predecessorTask?.finishTick && task.startTick < predecessorTask.finishTick) {
              collisionPoints.push({ x: task.startTick, y: floor });
            }
          }
        }
      });

      chart.data.datasets = [
        ...tradeDatasets,
        {
          label: "Collision",
          data: collisionPoints,
          parsing: false,
          showLine: false,
          pointRadius: 6,
          pointHoverRadius: 7,
          pointStyle: "crossRot",
          borderColor: "#dc2626",
          backgroundColor: "#dc2626"
        }
      ];
      chart.options.scales.x.min = 0;
      chart.options.scales.x.max = fixedTimeAxisMax;
      chart.update();
    }

    function renderState(rawState) {
      if (!rawState) {
        latestState = null;
        updateStatus("Lecturer has not initialized the game.", true);
        return;
      }

      latestState = sanitizeState(rawState);
      fixedTimeAxisMax = getFixedTimeAxisMax(latestState);
      updateStatus(latestState.running ? "Simulation running" : latestState.tick > 0 ? "Simulation paused" : "Initialized and waiting to start");
      syncAutoProgressLoop(latestState);
      renderControls(latestState);
      renderMetrics(latestState);
      renderTeamMultipliers(latestState);
      renderCPM(latestState);
      renderGantt(latestState);
      renderSCurve(latestState);
      renderLOB(latestState);
    }

    onValue(gameRef, (snapshot) => {
      renderState(snapshot.val());
    }, (error) => {
      updateStatus(`Firebase unavailable: ${error.message}`, true);
    });
  </script>
</body>
</html>
